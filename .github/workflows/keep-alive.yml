name: Keep Render backend awake

on:
  schedule:
    # Render's free plan spins the service down after ~15 min of inactivity.
    # Ping every 10 minutes to stay comfortably under that threshold.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          url="https://creativ-pressing-back.onrender.com/api/health"
          echo "Pinging $url"

          # Render free instances can take 30-60s to wake up from a cold start,
          # so retry for a while instead of failing on the first cold response.
          if curl --silent --show-error --fail \
              --retry 5 --retry-delay 10 --retry-all-errors \
              --max-time 90 \
              "$url"; then
            echo -e "\nBackend is awake and healthy."
          else
            echo "::error::Backend did not respond successfully at $url"
            exit 1
          fi
