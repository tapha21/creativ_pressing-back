services:
  - type: web
    name: creativ-pressing-api
    env: docker
    plan: free
    healthCheckPath: /api/shops
    envVars:
      - key: CORS_ALLOWED_ORIGINS
        value: https://creativ-pressing.vercel.app,http://localhost:5173,http://localhost:3000
      - key: DB_HOST
        fromDatabase:
          name: creativ-pressing-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: creativ-pressing-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: creativ-pressing-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: creativ-pressing-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: creativ-pressing-db
          property: password

databases:
  - name: creativ-pressing-db
    plan: free
