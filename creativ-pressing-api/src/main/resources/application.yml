server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: creativ-pressing-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:creativ_pressing_db}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USER:creativ_user}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:creativ_password}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    time-zone: UTC

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://creativ-pressing.vercel.app}
  media:
    upload-dir: media
  seed:
    enabled: true
