server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: creativ-pressing-api

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/pressing}
      database: ${MONGODB_DATABASE:pressing}

  jackson:
    time-zone: UTC

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://creativ-pressing.vercel.app}
  media:
    upload-dir: media
  seed:
    enabled: true
